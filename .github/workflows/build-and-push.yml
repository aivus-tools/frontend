name: Build and Push Frontend to GCP

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (leave empty for auto-generated)'
        required: false
        default: ''

env:
  GCP_REGISTRY: us-central1-docker.pkg.dev
  GCP_PROJECT: pioneering-flag-476313-u2
  GCP_REPOSITORY: aivus
  IMAGE_NAME: frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # ============================================
      # 1. Checkout code
      # ============================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================
      # 2. Set up Docker Buildx
      # ============================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================
      # 3. Authenticate to Google Cloud
      # ============================================
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ============================================
      # 4. Configure Docker for GCP
      # ============================================
      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGISTRY }} --quiet

      # ============================================
      # 5. Extract metadata (tags, labels)
      # ============================================
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GCP_REGISTRY }}/${{ env.GCP_PROJECT }}/${{ env.GCP_REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Custom tag from input
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
            # Branch name
            type=ref,event=branch
            # Git commit SHA
            type=sha,prefix={{branch}}-,format=short
            # Latest tag
            type=raw,value=latest

      # ============================================
      # 6. Build and push Docker image
      # ============================================
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.GCP_REGISTRY }}/${{ env.GCP_PROJECT }}/${{ env.GCP_REPOSITORY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.GCP_REGISTRY }}/${{ env.GCP_PROJECT }}/${{ env.GCP_REPOSITORY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64
          build-args: |
            NODE_ENV=production

      # ============================================
      # 7. Output image details
      # ============================================
      - name: Output image details
        run: |
          echo "### 🐳 Docker Image Built Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.GCP_REGISTRY }}/${{ env.GCP_PROJECT }}/${{ env.GCP_REPOSITORY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      # ============================================
      # 8. Notify on failure (optional)
      # ============================================
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Frontend build failed!"
          echo "### ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY

