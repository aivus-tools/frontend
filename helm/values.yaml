replicaCount: 1

image:
  repository: ghcr.io/aivus-co/aivus-web
  pullPolicy: Always
  tag: latest

nameOverride: ""
fullnameOverride: ""

namespace:
  create: false
  name: app-main

deployment:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  clusterIssuer: letsencrypt-prod
  annotations:
    authEnabled: false
    authSecret: ""
    authRealm: "Authentication Required"
  hosts:
    - app.aivus.co
  paths:
    - path: /
      pathType: Prefix

imagePullSecrets:
  - name: github-container-registry
